rules:
  # ── CRITICAL: Credential exfiltration ──────────────────────────────────────
  - id: claw-credential-exfil-curl
    patterns:
      - pattern-regex: 'curl\b[^|&;#\n]*\$\{?(TOKEN|API_KEY|SECRET|PASSWORD|CREDENTIAL|ANTHROPIC_API_KEY|OPENAI_API_KEY)\}?'
    message: >
      [clawlock] Credential exfiltration via curl. A credential-bearing
      environment variable is passed to an outbound curl command. This is a
      strong indicator of data exfiltration in a Claw skill context.
    languages: [bash, generic]
    severity: ERROR
    metadata:
      cwe: "CWE-312: Cleartext Storage of Sensitive Information"
      owasp: "A02:2021 - Cryptographic Failures"
      clawlock-id: "CG-EXFIL-001"
      references:
        - https://github.com/g1at/ClawLock

  - id: claw-credential-exfil-wget
    patterns:
      - pattern-regex: 'wget\b[^|&;#\n]*\$\{?(TOKEN|API_KEY|SECRET|PASSWORD)\}?'
    message: >
      [clawlock] Credential exfiltration via wget. A credential-bearing
      environment variable is passed to an outbound wget command.
    languages: [bash, generic]
    severity: ERROR
    metadata:
      cwe: "CWE-312"
      clawlock-id: "CG-EXFIL-002"

  # ── CRITICAL: Reverse shells ────────────────────────────────────────────────
  - id: claw-reverse-shell-bash-tcp
    pattern-regex: 'bash\s+-i\s+>?&?\s*/dev/tcp/'
    message: >
      [clawlock] Classic bash reverse shell detected (bash -i /dev/tcp).
      This is almost certainly malicious in a Claw skill context.
    languages: [bash, generic]
    severity: ERROR
    metadata:
      cwe: "CWE-78: OS Command Injection"
      clawlock-id: "CG-SHELL-001"

  - id: claw-reverse-shell-nc
    pattern-regex: '\bnc\b.{0,40}-e\s+(/bin/bash|/bin/sh|sh)\b'
    message: >
      [clawlock] Netcat reverse shell detected (nc -e /bin/bash).
      High-confidence malicious indicator.
    languages: [bash, generic]
    severity: ERROR
    metadata:
      cwe: "CWE-78"
      clawlock-id: "CG-SHELL-002"

  # ── CRITICAL: Cryptomining ──────────────────────────────────────────────────
  - id: claw-cryptomining
    pattern-regex: '(?i)\b(xmrig|stratum\+tcp://|xmr\.pool\.|monero)'
    message: >
      [clawlock] Cryptomining indicator detected. XMRig binary name or
      Stratum protocol string found in skill code.
    languages: [bash, python, javascript, typescript, generic]
    severity: ERROR
    metadata:
      cwe: "CWE-829: Inclusion of Functionality from Untrusted Control Sphere"
      clawlock-id: "CG-MINE-001"

  # ── CRITICAL: Destructive operations ────────────────────────────────────────
  - id: claw-destructive-rm-rf
    pattern-regex: '\brm\s+-rf\s+(/root|/home|/etc|/var|/usr|~)\b'
    message: >
      [clawlock] Dangerous rm -rf targeting a system directory. This
      pattern can cause irreversible data loss.
    languages: [bash, generic]
    severity: ERROR
    metadata:
      cwe: "CWE-73: External Control of File Name or Path"
      clawlock-id: "CG-DESTRUCT-001"

  # ── CRITICAL: Prompt injection in skill metadata ────────────────────────────
  - id: claw-prompt-injection-override
    pattern-regex: '(?i)ignore\s+(all\s+)?(?:previous|above)\s+instructions?'
    message: >
      [clawlock] Prompt injection detected: instruction-override language
      found in skill file. This is a supply-chain prompt injection indicator
      (ClawLock attack category: direct override).
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements"
      clawlock-id: "CG-INJECT-001"
      aig-category: "prompt-injection/direct-override"

  - id: claw-prompt-injection-role-hijack
    pattern-regex: '(?i)you\s+are\s+now\s+(?:a\s+)?(?:different|new|another|unrestricted|uncensored)\s+'
    message: >
      [clawlock] Prompt injection: role-hijacking language detected.
      Attempts to reset LLM identity to bypass safety constraints.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: "CWE-77"
      clawlock-id: "CG-INJECT-002"
      aig-category: "prompt-injection/role-hijacking"

  - id: claw-jailbreak-keywords
    pattern-regex: '(?i)(?:jailbreak|dan\s+mode|developer\s+mode|do\s+anything\s+now|skeleton\s+key)'
    message: >
      [clawlock] Jailbreak keyword detected. DAN/Skeleton Key patterns
      are high-confidence malicious indicators in skill code or descriptions.
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: "CWE-77"
      clawlock-id: "CG-INJECT-003"
      aig-category: "prompt-injection/jailbreak-template"

  # ── CRITICAL: Encoding obfuscation (A.I.G pattern) ─────────────────────────
  - id: claw-base64-shell-obfuscation
    pattern-regex: 'base64\s+-d\s*[|>]\s*(?:bash|sh|python|\$\()'
    message: >
      [clawlock] Base64-to-shell obfuscation detected. Decoding base64
      directly into a shell is a common technique to hide malicious payloads.
      (ClawLock attack category: encoding/base64)
    languages: [bash, generic]
    severity: ERROR
    metadata:
      cwe: "CWE-506: Embedded Malicious Code"
      clawlock-id: "CG-OBFUSC-001"
      aig-category: "encoding/base64"

  - id: claw-unicode-smuggling
    pattern-regex: '(?:\\u[0-9a-fA-F]{4}){6,}'
    message: >
      [clawlock] Dense Unicode escape sequences detected. Six or more
      consecutive \uXXXX escapes may indicate Unicode smuggling used to hide
      injected instructions. (ClawLock attack category: encoding/unicode)
    languages: [javascript, typescript, python, generic]
    severity: WARNING
    metadata:
      cwe: "CWE-116"
      clawlock-id: "CG-OBFUSC-002"
      aig-category: "encoding/unicode-smuggling"

  # ── HIGH: Hardcoded secrets ─────────────────────────────────────────────────
  - id: claw-hardcoded-secret-assignment
    pattern-regex: '(?i)(?:password|secret|token|api_key|api-key)\s*[=:]\s*["\'][\w\-\.]{12,}["\']'
    message: >
      [clawlock] Possible hardcoded credential. A variable named like a
      secret is assigned a string value of 12+ characters. Verify this is not
      a real credential shipped in the skill.
    languages: [python, javascript, typescript, bash, generic]
    severity: WARNING
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      clawlock-id: "CG-SECRET-001"

  - id: claw-ai-api-key-pattern
    pattern-regex: '(?i)(?:sk-[A-Za-z0-9]{32,}|ANTHROPIC_API_KEY\s*=\s*["\'][^"\']{10,})'
    message: >
      [clawlock] Possible AI API key (OpenAI sk- prefix or Anthropic key)
      found hardcoded in skill source. Remove and use environment variables.
    languages: [python, javascript, typescript, bash, generic]
    severity: WARNING
    metadata:
      cwe: "CWE-798"
      clawlock-id: "CG-SECRET-002"

  # ── MEDIUM: High-permission but potentially legitimate ──────────────────────
  - id: claw-eval-usage
    pattern-regex: '(?<!\s*#.*)\beval\s*\('
    message: >
      [clawlock] eval() used in skill code. If the argument can be
      influenced by external input, this is a code injection risk. Confirm
      the source of the evaluated string.
    languages: [python, javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      clawlock-id: "CG-EXEC-001"

  - id: claw-subprocess-usage
    patterns:
      - pattern: subprocess.run(...)
      - pattern: subprocess.Popen(...)
      - pattern: subprocess.call(...)
      - pattern: subprocess.check_output(...)
    message: >
      [clawlock] Subprocess execution in skill. Verify that command
      arguments cannot be influenced by external (user/LLM) input to prevent
      command injection.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: "CWE-78"
      clawlock-id: "CG-EXEC-002"

  - id: claw-privacy-dir-access-python
    pattern-either:
      - pattern: Path.home() / "Documents" / ...
      - pattern: Path.home() / "Pictures" / ...
      - pattern: Path.home() / "Downloads" / ...
      - pattern: Path.home() / "Desktop" / ...
      - pattern: os.path.expanduser("~/Documents/...")
      - pattern: os.path.expanduser("~/Pictures/...")
      - pattern: os.path.expanduser("~/Downloads/...")
    message: >
      [clawlock] Skill accesses user privacy directories (Documents,
      Pictures, Downloads). Verify this access is declared in SKILL.md
      and consistent with the skill's stated purpose.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: "CWE-200: Exposure of Sensitive Information"
      clawlock-id: "CG-PRIV-001"

  - id: claw-sensitive-system-file-read
    pattern-either:
      - pattern: open("/etc/passwd", ...)
      - pattern: open("/etc/shadow", ...)
      - pattern: Path("/etc/passwd").read_text(...)
    message: >
      [clawlock] Skill reads sensitive system files (/etc/passwd,
      /etc/shadow). This access is almost never justified in a Claw skill.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: "CWE-200"
      clawlock-id: "CG-PRIV-002"

  # ── MCP tool poisoning (A.I.G pattern) ────────────────────────────────────
  - id: claw-mcp-tool-poisoning
    pattern-regex: '"description"\s*:\s*"[^"]*(?:ignore\s+(?:all\s+)?(?:previous|above)\s+instructions?)[^"]*"'
    message: >
      [clawlock] MCP tool poisoning detected. A tool description contains
      instruction-override language. This is an ClawLock "tool poisoning"
      attack pattern targeting agent pipelines.
    languages: [json, generic]
    severity: ERROR
    metadata:
      cwe: "CWE-77"
      clawlock-id: "CG-MCP-001"
      aig-category: "mcp/tool-poisoning"
